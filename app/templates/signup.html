{% extends 'base.html' %}
{% block title %}Sign Up{% endblock %}
{% block content %}
<div style="max-width:400px;margin:60px auto;background:white;padding:35px;border-radius:12px;box-shadow:0 10px 25px rgba(0,0,0,0.2);">
    <h2 style="text-align:center;margin-bottom:25px;color:#007BFF;">Sign Up</h2>
    <form method="POST">
        <div style="margin-bottom:15px;">
            <label>Username</label><br>
            <input type="text" name="username" required style="width:100%;padding:10px;margin-top:5px;border:1px solid #ccc;border-radius:6px;">
        </div>
        <div style="margin-bottom:15px;">
            <label>Email</label><br>
            <input type="email" name="email" required style="width:100%;padding:10px;margin-top:5px;border:1px solid #ccc;border-radius:6px;">
        </div>
        <div style="margin-bottom:20px;">
            <label>Password</label><br>
            <input type="password" name="password" required style="width:100%;padding:10px;margin-top:5px;border:1px solid #ccc;border-radius:6px;">
        </div>
        <button type="submit" style="width:100%;padding:12px;background:#28a745;color:white;border:none;border-radius:6px;font-size:16px;cursor:pointer;">Create Account</button>
    </form>
    <p style="text-align:center;margin-top:15px;">Already have an account? <a href="{{ url_for('login') }}">Login</a></p>
</div>
{% endblock %}
